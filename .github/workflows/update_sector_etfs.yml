name: Update Yahoo Sector ETFs

on:
  workflow_dispatch:

  schedule:
    # Every Monday at 6:00 AM UTC
    # This is 4:00 PM Sydney during AEST and 5:00 PM during AEDT.
    - cron: "0 6 * * 1"

permissions:
  contents: write

concurrency:
  group: update-yahoo-sector-etfs
  cancel-in-progress: false

jobs:
  update-sector-etfs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Update sector ETF data
        run: |
          python update_sector_etfs.py

      - name: Validate compact output
        run: |
          test -f data/excel/sector_etfs_compact.csv

          python - <<'PY'
          import pandas as pd
          from pathlib import Path

          output = Path("data/excel/sector_etfs_compact.csv")

          df = pd.read_csv(output)

          required_columns = {
              "sector",
              "ticker",
              "etf_name",
              "retrieved_at_utc",
          }

          missing_columns = required_columns - set(df.columns)

          if missing_columns:
              raise SystemExit(
                  f"Missing required columns: {sorted(missing_columns)}"
              )

          expected_tickers = {
              "ACWI": "Benchmark",
              "NANR": "Theme - Natural Resources",
              "BOTZ": "Theme - Robotics & AI",
          }

          for ticker, expected_sector in expected_tickers.items():
              matches = df.loc[df["ticker"].astype(str).str.upper() == ticker]

              if len(matches) != 1:
                  raise SystemExit(
                      f"{ticker} should appear exactly once, but appears "
                      f"{len(matches)} times."
                  )

              actual_sector = str(matches.iloc[0]["sector"])

              if actual_sector != expected_sector:
                  raise SystemExit(
                      f"{ticker} has sector '{actual_sector}', expected "
                      f"'{expected_sector}'."
                  )

          print(f"Validated {len(df)} rows in {output}")
          print("ACWI, NANR and BOTZ are present with the correct labels.")
          PY

      - name: Show changed files
        run: |
          git status --short
          git diff --stat

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          echo "Files being committed:"
          git diff --cached --name-only

          git commit -m "Update Yahoo sector ETF data"
          git push
